kind = "web"
previewPath = "/"
title = "Stock Market Analyzer"
version = "1.0.0"
id = "artifacts/stock-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18797
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/stock-analyzer run dev"

[services.env]
PORT = "18797"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/stock-analyzer", "run", "build"]
publicDir = "artifacts/stock-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
